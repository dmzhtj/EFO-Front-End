<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Agreement - EFO</title>
    <style>
        :root {
            --bg-gray: #d4d0c8;
            --title-blue: #000080;
            --border-light: #fff;
            --text-dark: #000;
            --text-gray: #333;
            --link-blue: #0000ee;
            --link-visited: #551a8b;
            --maroon: #cc0000;
            --disabled-text: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url("./BG.png") no-repeat center center fixed;
            background-size: 100% 100%;
            font-family: 'Times New Roman', '宋体', serif;
            font-size: 19px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        table.main {
            width: 480px;
            border: 2px outset var(--border-light);
            background: var(--bg-gray);
            border-collapse: collapse;
            height: fit-content;
            margin-top: 90px;
        }

        table.main td.title-bar {
            background: var(--title-blue);
            color: var(--border-light);
            font-weight: bold;
            padding: 4px 6px;
            font-size: 17px;
            text-align: left;
            letter-spacing: 0.3px;
        }

        table.main td.title-bar .lang-btn {
            float: right;
            font-size: 14px;
            font-weight: normal;
            border: 1px outset var(--border-light);
            background: var(--bg-gray);
            color: var(--text-dark);
            padding: 1px 8px;
            cursor: pointer;
            font-family: 'Times New Roman', '宋体', serif;
            margin-left: 8px;
            transition: background 0.1s;
        }
        table.main td.title-bar .lang-btn:hover {
            background: #c8c4bc;
        }
        table.main td.title-bar .lang-btn:active {
            border-style: inset;
        }

        table.main td.content {
            padding: 15px 20px;
        }

        textarea.agreement-box {
            width: 100%;
            height: 240px;
            border: 2px inset var(--border-light);
            background: #fff;
            font-family: 'Courier New', 'SimSun', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 10px 12px;
            resize: none;
            color: var(--text-dark);
            scrollbar-width: thin;
            scrollbar-color: #888 var(--bg-gray);
            outline: none;
            transition: background 0.15s;
        }
        textarea.agreement-box:focus {
            background: #fffff0;
        }

        .checkbox-row {
            text-align: left;
            margin-top: 8px;
            font-size: 17px;
            font-weight: bold;
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--text-dark);
        }

        .btn-row {
            text-align: center;
            margin-top: 10px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="submit"],
        input[type="button"] {
            border: 2px outset var(--border-light);
            background: var(--bg-gray);
            padding: 4px 20px;
            font-family: 'Times New Roman', '宋体', serif;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            color: var(--text-dark);
            transition: background 0.15s, color 0.15s;
        }
        input[type="submit"]:hover:not(:disabled),
        input[type="button"]:hover:not(:disabled) {
            background: #c8c4bc;
        }
        input[type="submit"]:active:not(:disabled),
        input[type="button"]:active:not(:disabled) {
            border-style: inset;
        }
        input[type="submit"]:disabled,
        input[type="button"]:disabled {
            color: var(--disabled-text);
            cursor: not-allowed;
        }

        a {
            color: var(--link-blue);
            text-decoration: underline;
            font-size: 16px;
            transition: color 0.15s;
        }
        a:visited {
            color: var(--link-visited);
        }
        a:hover {
            color: #3333ff;
        }

        hr {
            border: 1px inset var(--border-light);
            margin: 10px 0 6px 0;
        }

        .status-bar {
            background: var(--bg-gray);
            border: 1px inset var(--border-light);
            padding: 3px 8px;
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 8px;
            text-align: left;
            min-height: 1.5em;
        }

        marquee {
            font-size: 15px;
            color: var(--maroon);
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 15px;
            color: var(--text-dark);
            padding: 24px 0;
            background: transparent;
            flex-shrink: 0;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* 响应式微调 */
        @media (max-width: 520px) {
            table.main {
                width: 94vw;
                margin-top: 30px;
            }
            table.main td.content {
                padding: 12px 14px;
            }
            textarea.agreement-box {
                height: 200px;
                font-size: 13px;
            }
        }
    </style>
</head>

                    alert('✓ Application submitted successfully!\n\nThank you for reading and agreeing to the EFO User Agreement.\nWe will review your application shortly. Please check your email.\n\n—— Earth Future (Four-Body) Organization');
                    btnAgree.value = 'Submitted';
                    updateStatusMessage('Application submitted. Awaiting review.');
                    // 保持按钮禁用状态，防止重复提交
                }, 1200);
            }

            function handleDisagree() {
                updateStatusMessage('You chose not to agree.');
                if (confirm('You have chosen not to agree to the agreement.\n\nClick "OK" to leave this page.\nWe respect your decision.')) {
                    updateStatusMessage('Leaving...');
                    window.location.href = 'about:blank';
                } else {
                    updateStatusMessage('Waiting for your decision...');
                }
            }

            function updateStatusMessage(message) {
                statusText.textContent = message;
            }

            function updateStatusAfterLanguageChange() {
                if (agreeCheckbox.checked) {
                    updateStatusMessage(currentLang === 'EN' ? 'Confirmed. You may now submit.' : '已确认，现在可以提交。');
                } else {
                    updateStatusMessage(currentLang === 'EN' ? 'Please check the box to confirm you have read the agreement.' : '请勾选复选框以确认您已阅读协议。');
                }
            }
        })();
    </script>

</body>
</html>
