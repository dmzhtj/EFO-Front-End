<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot PIN - EFO</title>
    <style>
        :root {
            --bg-gray: #d4d0c8;
            --title-blue: #000080;
            --border-light: #fff;
            --text-dark: #000;
            --text-gray: #333;
            --link-blue: #0000ee;
            --link-visited: #551a8b;
            --maroon: #cc0000;
            --disabled-text: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url("./BG.png") no-repeat center center fixed;
            background-size: 100% 100%;
            font-family: 'Times New Roman', '宋体', serif;
            font-size: 19px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 35vh;
        }

        table.main {
            width: 400px;
            border: 2px outset var(--border-light);
            background: var(--bg-gray);
            border-collapse: collapse;
            height: fit-content;
        }

        table.main td.title-bar {
            background: var(--title-blue);
            color: var(--border-light);
            font-weight: bold;
            padding: 3px 6px;
            font-size: 17px;
            text-align: left;
            letter-spacing: 0.5px;
        }

        table.main td.content {
            padding: 18px 22px;
        }

        table.form {
            width: 100%;
            border-collapse: collapse;
        }
        table.form td {
            padding: 4px 0;
        }
        table.form td.label {
            font-weight: bold;
            font-size: 17px;
        }

        input[type="email"] {
            width: 100%;
            border: 2px inset var(--border-light);
            background: #fff;
            padding: 6px 8px;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            color: var(--text-dark);
            outline: none;
            transition: background 0.15s ease;
        }
        input[type="email"]:focus {
            background: #fffff0;
        }
        input.error {
            border-color: #cc0000 !important;
            background: #fff0f0 !important;
        }

        .btn-row {
            text-align: center;
            padding-top: 14px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="submit"],
        input[type="button"],
        .btn-back {
            border: 2px outset var(--border-light);
            background: var(--bg-gray);
            padding: 5px 18px;
            font-family: 'Times New Roman', '宋体', serif;
            font-size: 17px;
            cursor: pointer;
            color: var(--text-dark);
            min-width: 70px;
            letter-spacing: 0.3px;
            transition: background 0.1s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        input[type="submit"]:hover,
        input[type="button"]:hover,
        .btn-back:hover {
            background: #c8c4bc;
        }
        input[type="submit"]:active,
        input[type="button"]:active,
        .btn-back:active {
            border-style: inset;
        }
        input[type="submit"]:disabled {
            color: var(--disabled-text);
            cursor: wait;
        }

        a {
            color: var(--link-blue);
            text-decoration: underline;
            font-size: 16px;
            transition: color 0.15s;
        }
        a:visited {
            color: var(--link-visited);
        }
        a:hover {
            color: #3333ff;
        }

        hr {
            border: 1px inset var(--border-light);
            margin: 14px 0 8px 0;
        }

        .error-msg {
            color: #cc0000;
            font-size: 13px;
            font-weight: bold;
            min-height: 18px;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.2px;
            line-height: 1.3;
        }

        .hint-text {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
            font-style: italic;
        }

        .link-row {
            text-align: center;
            font-size: 15px;
        }

        marquee {
            font-size: 15px;
            color: var(--maroon);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 15px;
            color: var(--text-dark);
            padding: 20px 0 16px;
            flex-shrink: 0;
            line-height: 1.6;
            opacity: 0.85;
        }

        @media (max-width: 440px) {
            table.main {
                width: 92vw;
            }
            table.main td.content {
                padding: 14px 16px;
            }
            .page-content {
                padding-top: 15vh;
            }
            input[type="email"] {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="page-content">
        <table class="main">
            <tr>
                <td class="title-bar">:: Forgot PIN ::</td>
            </tr>
            <tr>
                <td class="content">
                    <marquee scrollamount="3" behavior="scroll">
                        ★ ENTER YOUR REGISTERED EMAIL TO RESET YOUR PIN ★
                    </marquee>

                    <form id="forgotForm" method="post" action="#" onsubmit="return handleReset(event)">
                        <table class="form">
                            <tr>
                                <td class="label">email:</td>
                            </tr>
                            <tr>
                                <td>
                                    <input
                                    type="email"
                                    name="email"
                                    id="emailInput"
                                    placeholder="Registered email address"
                                    autocomplete="email"
                                    required
                                    >
                                    <div class="hint-text">We will send a PIN reset link to this address.</div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="error-msg" id="errorMsg"></div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="btn-row">
                                        <input type="submit" value="reset pin">
                                        <input type="button" value="back" onclick="window.location.href='#'">
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </form>

                    <hr>
                    <div class="link-row">
                        Remember your PIN? <a href="#">Log In</a>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="footer">
        "我点燃了火，却控制不了它"<br>
        &copy; 2026 EFO. Some rights reserved.
    </div>

    <script>
        function handleReset(event) {
            event.preventDefault();
            clearErrors();

            const emailInput = document.getElementById('emailInput');
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.querySelector('input[type="submit"]');

            const email = emailInput.value.trim();

            // 验证邮箱
            if (!email) {
                showError(emailInput, 'Please enter your email address.');
                return false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError(emailInput, 'Please enter a valid email address.');
                return false;
            }

            // 模拟发送重置邮件
            submitBtn.value = 'sending...';
            submitBtn.disabled = true;
            submitBtn.style.cursor = 'wait';
            errorMsg.textContent = '';
            errorMsg.style.color = '#333';

            setTimeout(function() {
                submitBtn.value = 'reset pin';
                submitBtn.disabled = false;
                submitBtn.style.cursor = 'pointer';
                errorMsg.textContent = '✓ A reset link has been sent to ' + email + '. Please check your inbox.';
                errorMsg.style.color = '#006600';
                emailInput.value = '';
                console.log('Password reset email sent to:', email);
            }, 1500);

            return false;
        }

        function showError(inputElement, message) {
            inputElement.classList.add('error');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '⚠ ' + message;
            errorMsg.style.color = '#cc0000';
            inputElement.focus();
            setTimeout(function() {
                inputElement.classList.remove('error');
            }, 4000);
        }

        function clearErrors() {
            const emailInput = document.getElementById('emailInput');
            emailInput.classList.remove('error');
            document.getElementById('errorMsg').textContent = '';
        }

        // 输入时清除错误
        document.getElementById('emailInput').addEventListener('input', function() {
            this.classList.remove('error');
            if (!this.value.trim()) {
                document.getElementById('errorMsg').textContent = '';
            } else {
                const err = document.getElementById('errorMsg');
                if (err.style.color === 'rgb(204, 0, 0)') {
                    err.textContent = '';
                }
            }
        });

        // 回车键提交
        document.getElementById('emailInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('forgotForm').dispatchEvent(new Event('submit', { cancelable: true }));
            }
        });

        console.log(':: EFO Forgot PIN System Ready ::');
    </script>

</body>
</html>
